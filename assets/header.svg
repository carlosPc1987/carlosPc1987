<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>

    <radialGradient id="spot" cx="35%" cy="45%" r="70%">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#a78bfa" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0b1220" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#94a3b8" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="#070b14"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#spot)"/>

  <!-- Neon frame -->
  <rect x="28" y="28" width="1144" height="264" rx="26" fill="#0b1220" stroke="url(#neon)" stroke-width="2"/>
  <rect x="28" y="28" width="1144" height="264" rx="26" fill="none" stroke="url(#neon)" stroke-width="8" opacity="0.30" filter="url(#glow)"/>

  <!-- Accent line -->
  <path d="M80 220 C 260 120, 520 280, 740 160 S 1040 120, 1120 190"
        fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.65" filter="url(#glow)"/>

  <!-- Title -->
  <text x="80" y="150" fill="#e5e7eb"
        font-family="Segoe UI, Inter, system-ui" font-size="56" font-weight="800"
        letter-spacing="2">
    DEVELOPER
  </text>

  <text x="80" y="210" fill="#cbd5e1"
        font-family="Segoe UI, Inter, system-ui" font-size="48" font-weight="800"
        letter-spacing="2">
    JAVA BACKEND
  </text>

  <!-- Small neon tag -->
  <g transform="translate(845 78)">
    <rect x="0" y="0" width="290" height="44" rx="14" fill="url(#neon)" opacity="0.14" stroke="url(#neon)"/>
    <text x="18" y="30" fill="#e5e7eb" font-family="Segoe UI, Inter, system-ui" font-size="18" font-weight="700">
      Secure · Scalable · APIs
    </text>
  </g>
</svg>
