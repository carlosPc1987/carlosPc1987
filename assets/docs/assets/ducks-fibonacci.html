<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=900">
  <title>Patos Fibonacci — Grabar como GIF para GitHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Recuadro tipo README: fondo oscuro, bordes suaves */
    .recuadro {
      width: 900px;
      padding: 28px 32px 32px;
      background: #0b1220;
      border: 1px solid rgba(167, 139, 250, 0.35);
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(167, 139, 250, 0.08);
    }

    .recuadro .linea {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.4), transparent);
      margin-bottom: 24px;
    }

    /* Contenedor de patos: recorta lo que se sale */
    .ducks-track {
      width: 100%;
      overflow: hidden;
      margin: 12px 0;
    }

    .ducks-row {
      display: flex;
      align-items: center;
      width: max-content;
      animation: run 12s linear infinite;
    }

    /* Animación: los patos "corren" de derecha a izquierda (1 ciclo = 7 patos Fibonacci) */
    @keyframes run {
      from { transform: translateX(0); }
      to { transform: translateX(-1044px); }
    }

    .duck {
      font-size: 36px;
      line-height: 1;
      display: inline-block;
      filter: drop-shadow(0 0 8px rgba(167, 139, 250, 0.3));
    }

    /* Espacios entre patos = Fibonacci (1,1,2,3,5,8,13,21 px * factor) */
    .duck { margin-right: 24px; }   /* F1=1 * 24 */
    .duck:nth-child(2) { margin-right: 24px; }   /* F2=1 */
    .duck:nth-child(3) { margin-right: 48px; }   /* F3=2 */
    .duck:nth-child(4) { margin-right: 72px; }   /* F4=3 */
    .duck:nth-child(5) { margin-right: 120px; }  /* F5=5 */
    .duck:nth-child(6) { margin-right: 192px; }  /* F6=8 */
    .duck:nth-child(7) { margin-right: 312px; }   /* F7=13 */
    .duck:nth-child(8) { margin-right: 24px; }   /* vuelve a empezar F1 */
    .duck:nth-child(9) { margin-right: 24px; }
    .duck:nth-child(10) { margin-right: 48px; }
    .duck:nth-child(11) { margin-right: 72px; }
    .duck:nth-child(12) { margin-right: 120px; }
    .duck:nth-child(13) { margin-right: 192px; }
    .duck:nth-child(14) { margin-right: 312px; }

    .footer {
      text-align: center;
      color: rgba(248, 250, 252, 0.85);
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 15px;
      margin-top: 20px;
    }

    .footer .pato-footer { font-size: 22px; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="recuadro">
    <div class="linea"></div>

    <div class="ducks-track">
      <div class="ducks-row" id="ducks"></div>
    </div>

    <div class="linea"></div>
    <p class="footer">Crafted with "LOVE" by Carlos and approved by <span class="pato-footer">🦆</span></p>
  </div>

  <script>
    // Secuencia Fibonacci: 1, 1, 2, 3, 5, 8, 13 (espacios ya aplicados en CSS)
    // Repetimos suficientes patos para que el bucle se vea fluido
    const totalDucks = 14;
    const row = document.getElementById('ducks');
    for (let i = 0; i < totalDucks; i++) {
      const span = document.createElement('span');
      span.className = 'duck';
      span.textContent = '🦆';
      span.setAttribute('aria-hidden', 'true');
      row.appendChild(span);
    }
  </script>
</body>
</html>
