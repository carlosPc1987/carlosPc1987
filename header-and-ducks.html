<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>Cabecera + Patos — Grabar todo como un solo GIF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Contenedor único: cabecera + patos (mismo ancho para grabar 1 GIF) */
    .banner {
      width: 1200px;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(167, 139, 250, 0.12);
    }

    /* ----- Cabecera DEVELOPER JAVA BACKEND ----- */
    .header-wrap {
      width: 1200px;
      height: 320px;
      display: block;
    }

    @keyframes line-flow {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -780; }
    }
    @keyframes border-pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.45; }
    }
    .line-animated { animation: line-flow 2.8s linear infinite; }
    .frame-glow { animation: border-pulse 2.5s ease-in-out infinite; }

    /* ----- Franja de patos (Fibonacci) ----- */
    .ducks-strip {
      width: 1200px;
      padding: 20px 28px 24px;
      background: #0b1220;
      border-left: 2px solid rgba(167, 139, 250, 0.4);
      border-right: 2px solid rgba(167, 139, 250, 0.4);
      border-bottom: 2px solid rgba(167, 139, 250, 0.4);
      border-radius: 0 0 26px 26px;
    }

    .ducks-track {
      width: 100%;
      overflow: hidden;
    }

    .ducks-row {
      display: flex;
      align-items: center;
      width: max-content;
      animation: run 12s linear infinite;
    }

    @keyframes run {
      from { transform: translateX(0); }
      to { transform: translateX(-1044px); }
    }

    .duck {
      font-size: 32px;
      line-height: 1;
      display: inline-block;
      margin-right: 24px;
      filter: drop-shadow(0 0 6px rgba(167, 139, 250, 0.35));
    }
    .duck:nth-child(2) { margin-right: 24px; }
    .duck:nth-child(3) { margin-right: 48px; }
    .duck:nth-child(4) { margin-right: 72px; }
    .duck:nth-child(5) { margin-right: 120px; }
    .duck:nth-child(6) { margin-right: 192px; }
    .duck:nth-child(7) { margin-right: 312px; }
    .duck:nth-child(8) { margin-right: 24px; }
    .duck:nth-child(9) { margin-right: 24px; }
    .duck:nth-child(10) { margin-right: 48px; }
    .duck:nth-child(11) { margin-right: 72px; }
    .duck:nth-child(12) { margin-right: 120px; }
    .duck:nth-child(13) { margin-right: 192px; }
    .duck:nth-child(14) { margin-right: 312px; }
  </style>
</head>
<body>
  <div class="banner">
    <!-- 1) Cabecera DEVELOPER JAVA BACKEND -->
    <div class="header-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
        <defs>
          <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#22d3ee"/>
            <stop offset="0.5" stop-color="#a78bfa"/>
            <stop offset="1" stop-color="#22c55e"/>
          </linearGradient>
          <linearGradient id="text-lilac" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f5f3ff"/>
            <stop offset="0.5" stop-color="#ede9fe"/>
            <stop offset="1" stop-color="#e8e0f5"/>
          </linearGradient>
          <radialGradient id="spot" cx="35%" cy="45%" r="70%">
            <stop offset="0" stop-color="#60a5fa" stop-opacity="0.18"/>
            <stop offset="0.55" stop-color="#a78bfa" stop-opacity="0.10"/>
            <stop offset="1" stop-color="#0b1220" stop-opacity="0"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="b"/>
            <feMerge>
              <feMergeNode in="b"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="text-glow">
            <feGaussianBlur stdDeviation="2" result="tb"/>
            <feMerge>
              <feMergeNode in="tb"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
            <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#94a3b8" stroke-opacity="0.09" stroke-width="1"/>
          </pattern>
        </defs>

        <rect width="1200" height="320" fill="#070b14"/>
        <rect width="1200" height="320" fill="url(#grid)"/>
        <rect width="1200" height="320" fill="url(#spot)"/>

        <rect x="28" y="28" width="1144" height="264" rx="26" fill="#0b1220" stroke="url(#neon)" stroke-width="2"/>
        <rect class="frame-glow" x="28" y="28" width="1144" height="264" rx="26" fill="none" stroke="url(#neon)" stroke-width="8" opacity="0.35" filter="url(#glow)"/>

        <path class="line-animated"
              d="M80 220 C 260 120, 520 280, 740 160 S 1040 120, 1120 190"
              fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.9"
              filter="url(#glow)" stroke-linecap="round"
              stroke-dasharray="260 520" stroke-dashoffset="0"/>

        <text x="80" y="150" fill="url(#text-lilac)" filter="url(#text-glow)"
              font-family="Segoe UI, Inter, system-ui" font-size="56" font-weight="800" letter-spacing="2">DEVELOPER</text>
        <text x="80" y="210" fill="url(#text-lilac)" filter="url(#text-glow)"
              font-family="Segoe UI, Inter, system-ui" font-size="48" font-weight="800" letter-spacing="2">JAVA BACKEND</text>

        <g transform="translate(845 78)">
          <rect x="0" y="0" width="290" height="44" rx="14" fill="url(#neon)" opacity="0.14" stroke="url(#neon)"/>
          <text x="18" y="30" fill="#f5f3ff" font-family="Segoe UI, Inter, system-ui" font-size="18" font-weight="700">Secure · Scalable · APIs</text>
        </g>
      </svg>
    </div>

    <!-- 2) Línea de patos Fibonacci -->
    <div class="ducks-strip">
      <div class="ducks-track">
        <div class="ducks-row" id="ducks"></div>
      </div>
    </div>
  </div>

  <script>
    const totalDucks = 14;
    const row = document.getElementById('ducks');
    for (let i = 0; i < totalDucks; i++) {
      const span = document.createElement('span');
      span.className = 'duck';
      span.textContent = '🦆';
      span.setAttribute('aria-hidden', 'true');
      row.appendChild(span);
    }
  </script>
</body>
</html>
